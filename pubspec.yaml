name: nakano_food
description: NakanoFood - Gestión de despensa, recetas y planificación alimentaria

publish_to: 'none'

version: 2.0.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.7

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Image
  image_picker: ^1.1.2

  # Calendar
  table_calendar: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # UI
  flutter_slidable: ^3.1.1
  cupertino_icons: ^1.0.8
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1
  supabase_flutter: ^2.12.0
  connectivity_plus: ^7.0.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/icon/NakanoFood.png"

  android: "launcher_icon"
  # image_path_android: "assets/icon/icon.png"
  min_sdk_android: 24 # android min sdk min:16, default 21
  # adaptive_icon_background: "assets/icon/background.png"
  # adaptive_icon_foreground: "assets/icon/foreground.png"
  # adaptive_icon_foreground_inset: 16
  # adaptive_icon_monochrome: "assets/icon/monochrome.png"

  ios: true
  # image_path_ios: "assets/icon/icon.png"
  remove_alpha_ios: true
  # image_path_ios_dark_transparent: "assets/icon/icon_dark.png"
  # image_path_ios_tinted_grayscale: "assets/icon/icon_tinted.png"
  # desaturate_tinted_to_grayscale_ios: true
  # background_color_ios: "#ffffff"

  web:
    generate: true
    image_path: "assets/icon/NakanoFood.png"
    background_color: "#ffffff"
    theme_color: "#2E7D32"

  # windows:
  #   generate: true
  #   image_path: "path/to/image.png"
  #   icon_size: 48 # min:48, max:256, default: 48

  # macos:
  #   generate: true
  #   image_path: "path/to/image.png"

