name: nakano_food
description: NakanoFood - Gestión de despensa, recetas y planificación alimentaria

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.7

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Image
  image_picker: ^1.1.2

  # Calendar
  table_calendar: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # UI
  flutter_slidable: ^3.1.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
